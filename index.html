<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>طيّار | لوحة التطبيقات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sky:    #0ea5e9;
      --sky-d:  #0284c7;
      --night:  #0c1624;
      --panel:  #111e2e;
      --card:   #162130;
      --border: #1e3248;
      --text:   #e2eaf4;
      --muted:  #7a9ab8;
      --green:  #22c55e;
      --orange: #f97316;
      --purple: #a855f7;
      --red:    #ef4444;
      --radius: 14px;
      --font:   'Cairo', 'Segoe UI', system-ui, sans-serif;
    }
    :root.light {
      --sky:    #0284c7;
      --sky-d:  #0369a1;
      --night:  #eef4fb;
      --panel:  #ffffff;
      --card:   #f7faff;
      --border: #c5d9ef;
      --text:   #0c1e35;
      --muted:  #4d7a9e;
      --green:  #16a34a;
      --orange: #ea580c;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--night);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background .25s, color .2s;
    }

    /* ── Top bar ───────────────────────────────────────────── */
    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background .25s, border-color .25s;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }
    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--sky), var(--sky-d));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .brand-name {
      font-size: 1.25rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -.5px;
    }
    .brand-name span { color: var(--sky); }

    .topbar-actions { display: flex; align-items: center; gap: 12px; }

    .theme-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      font-family: var(--font);
      font-size: .82rem;
      display: flex; align-items: center; gap: 6px;
      transition: background .2s, color .2s;
    }
    .theme-btn:hover { background: var(--card); color: var(--text); }

    /* ── Main ──────────────────────────────────────────────── */
    .main {
      flex: 1;
      padding: 60px 32px 80px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    .page-header {
      text-align: center;
      margin-bottom: 56px;
    }
    .page-header h1 {
      font-size: 2rem;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 8px;
    }
    .page-header p {
      color: var(--muted);
      font-size: .95rem;
    }

    /* ── App grid ──────────────────────────────────────────── */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .app-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: transform .18s, box-shadow .18s, border-color .18s, background .25s;
      position: relative;
      overflow: hidden;
    }
    .app-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .18s;
      border-radius: var(--radius);
    }
    .app-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,.25);
    }
    .app-card:hover::before { opacity: 1; }
    .app-card:active { transform: translateY(-2px); }

    /* Per-app accent colors */
    .app-card.blue  { --ac: #0ea5e9; --ac-bg: rgba(14,165,233,.08); }
    .app-card.green { --ac: #22c55e; --ac-bg: rgba(34,197,94,.08); }
    .app-card.orange{ --ac: #f97316; --ac-bg: rgba(249,115,22,.08); }
    .app-card.purple{ --ac: #a855f7; --ac-bg: rgba(168,85,247,.08); }

    .app-card:hover { border-color: var(--ac); background: var(--ac-bg); }
    .app-card::before { background: var(--ac-bg); }

    .app-icon {
      width: 68px; height: 68px;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      background: var(--ac-bg);
      border: 1.5px solid color-mix(in srgb, var(--ac) 30%, transparent);
      transition: background .18s, transform .18s;
    }
    .app-card:hover .app-icon {
      background: color-mix(in srgb, var(--ac) 18%, transparent);
      transform: scale(1.08);
    }
    .app-icon svg { width: 36px; height: 36px; }

    .app-name {
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.4;
    }
    .app-desc {
      font-size: .78rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    /* ── Divider ───────────────────────────────────────────── */
    .section-label {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin: 40px 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Footer ────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: .75rem;
      border-top: 1px solid var(--border);
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 600px) {
      .topbar { padding: 0 16px; }
      .main   { padding: 32px 16px 60px; }
      .apps-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .app-card  { padding: 24px 14px 18px; }
      .app-icon  { width: 56px; height: 56px; border-radius: 14px; }
      .app-icon svg { width: 28px; height: 28px; }
      .page-header h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <!-- ── Top bar ── -->
  <header class="topbar">
    <a class="topbar-brand" href="#">
      <div class="brand-icon">✈️</div>
      <span class="brand-name">طيّ<span>ار</span></span>
    </a>
    <div class="topbar-actions">
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">
        <span id="themeIcon">☀️</span>
        <span id="themeLabel">الوضع النهاري</span>
      </button>
    </div>
  </header>

  <!-- ── Main ── -->
  <main class="main">

    <div class="page-header">
      <h1>مرحباً بك في طيّار 🚀</h1>
      <p>اختر التطبيق المناسب لدورك</p>
    </div>

    <!-- Core apps -->
    <div class="section-label">التطبيقات الأساسية</div>

    <div class="apps-grid">

      <!-- Admin -->
      <a href="tiar.html" class="app-card blue">
        <div class="app-icon">
          <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="13" height="13" rx="3" fill="#0ea5e9" opacity=".9"/>
            <rect x="20" y="3" width="13" height="13" rx="3" fill="#0ea5e9" opacity=".5"/>
            <rect x="3" y="20" width="13" height="13" rx="3" fill="#0ea5e9" opacity=".5"/>
            <rect x="20" y="20" width="13" height="13" rx="3" fill="#0ea5e9" opacity=".9"/>
          </svg>
        </div>
        <div class="app-name">لوحة الإدارة</div>
        <div class="app-desc">الطلبات، الطيارين، التقارير، والإعدادات</div>
      </a>

      <!-- Branch -->
      <a href="tiar_branch.html" class="app-card green">
        <div class="app-icon">
          <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 4L32 12V24L18 32L4 24V12L18 4Z" fill="#22c55e" opacity=".2" stroke="#22c55e" stroke-width="1.5"/>
            <circle cx="18" cy="18" r="5" fill="#22c55e"/>
            <circle cx="18" cy="7"  r="2.5" fill="#22c55e" opacity=".7"/>
            <circle cx="29" cy="13" r="2.5" fill="#22c55e" opacity=".7"/>
            <circle cx="29" cy="23" r="2.5" fill="#22c55e" opacity=".7"/>
            <circle cx="18" cy="29" r="2.5" fill="#22c55e" opacity=".7"/>
            <circle cx="7"  cy="23" r="2.5" fill="#22c55e" opacity=".7"/>
            <circle cx="7"  cy="13" r="2.5" fill="#22c55e" opacity=".7"/>
          </svg>
        </div>
        <div class="app-name">تطبيق الفروع</div>
        <div class="app-desc">مشرفو الفروع — استلام وتسليم الطلبات</div>
      </a>

      <!-- Store -->
      <a href="tiar_store.html" class="app-card orange">
        <div class="app-icon">
          <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 10H32L29 26H7L4 10Z" fill="#f97316" opacity=".2" stroke="#f97316" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M4 10L7 5H29L32 10" stroke="#f97316" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="12" cy="30" r="2.5" fill="#f97316"/>
            <circle cx="24" cy="30" r="2.5" fill="#f97316"/>
            <line x1="13" y1="15" x2="13" y2="22" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="18" y1="15" x2="18" y2="22" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="23" y1="15" x2="23" y2="22" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="app-name">بوابة المحلات</div>
        <div class="app-desc">أصحاب المحلات — طلب التوصيل ومتابعة الطلبات</div>
      </a>

    </div>

  </main>

  <footer>
    © 2025 طيّار — نظام إدارة التوصيل
  </footer>

  <script>
    // ── Theme ──────────────────────────────────────────────
    const THEME_KEY = "tiar-index-theme";

    function applyTheme(mode) {
      if (mode === "light") {
        document.documentElement.classList.add("light");
        document.getElementById("themeIcon").textContent  = "🌙";
        document.getElementById("themeLabel").textContent = "الوضع الليلي";
      } else {
        document.documentElement.classList.remove("light");
        document.getElementById("themeIcon").textContent  = "☀️";
        document.getElementById("themeLabel").textContent = "الوضع النهاري";
      }
    }

    function toggleTheme() {
      const isLight = document.documentElement.classList.contains("light");
      const next = isLight ? "dark" : "light";
      localStorage.setItem(THEME_KEY, next);
      applyTheme(next);
    }

    // Restore saved theme
    const savedTheme = localStorage.getItem(THEME_KEY) || "dark";
    applyTheme(savedTheme);
  </script>
</body>
</html>
